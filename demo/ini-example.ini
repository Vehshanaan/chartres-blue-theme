; ==============================================================================
; chartres-cathedral.ini — 沙特尔大教堂导览配置
; 使用 INI 格式展示 key = value 与 section 分组
; 注释以分号 (;) 开头
; ==============================================================================

[general]
name = Chartres Cathedral
location = Chartres, France
; 以下为建筑年代设定
year_built = 1260
style = High Gothic
has_towers = 1                         ; 布尔值: 1 = true
has_spire = 0                          ; 雷击毁掉了原始尖塔
is_unesco = yes                        ; 另一种布尔习惯
crypt_exists = true                    ; 又一写法
entry_fee = 0                          ; 免费进入主殿
tower_climb_fee = 8.50                 ; 浮点数 — 登塔费用 (欧元)

[dimensions]
length = 130.2                         ; 总长 (米)
nave_width = 16.4
nave_height = 36.5
; 玫瑰窗直径均为 10.5 米
rose_window_diameter = 10.5
tower_north_height = 113.0
tower_south_height = 105.0

[stained_glass]
total_windows = 176
famous_windows = Belle Verriere, Tree of Jesse, Charlemagne
dominant_color = Chartres blue
; 查特雷斯蓝 — 一种独特的钴蓝色调
rgb_approx = 0, 79, 152                ; 近似 RGB 值
has_12th_century_glass = 1
oldest_panel = 1145                    ; Tree of Jesse

[schedule]
; 开放时间
monday_friday = 08:30-19:00
saturday = 08:30-18:00
sunday = 09:00-19:00
; 宗教节日期间调整
holiday_note = Confirm with diocese

[visitor_info]
guided_tour = yes
guide_english = yes
guide_french = yes
audio_guide_languages = en, fr, de, it, es, zh
wheelchair_accessible = true
photography_allowed = false             ; 禁止闪光灯
max_group_size = 25

[crypt]
depth_m = 8.5
built = 1020
builder = Fulbert
; 圣富尔贝地下墓室是法国现存最大的罗马式地下墓室之一
features = Fulbert's crypt, Saint Lubin's crypt
status = open_to_public

