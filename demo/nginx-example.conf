# Nginx config — Chartres Blue stained-glass reverse proxy
# =========================================================

upstream chartres_backend {
    server 10.0.0.1:8080 weight=3;
    server 10.0.0.2:8080;
    server 10.0.0.3:8080 backup;
}

server {
    listen       443 ssl;
    server_name  chartres-blue.example.com;

    ssl_certificate     /etc/ssl/certs/chartres.crt;
    ssl_certificate_key /etc/ssl/private/chartres.key;

    # Static stained-glass assets
    location /glass/ {
        alias   /var/www/chartres/glass/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # API proxy to the upstream
    location /api/ {
        proxy_pass         http://chartres_backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # Rate limiting
        limit_req zone=api burst=20 nodelay;

        # CORS
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
            return 204;
        }
    }

    # Legacy URL rewrite
    location /old-panel/ {
        rewrite ^/old-panel/(.*)$ /api/$1 permanent;
    }

    # Health check
    location = /health {
        access_log off;
        return 200 "OK";
    }
}
