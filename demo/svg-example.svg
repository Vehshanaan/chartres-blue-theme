<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 400 500"
     width="400" height="500">
  <defs>
    <!-- Chartres Blue gradient -->
    <linearGradient id="skyBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a2647" />
      <stop offset="50%"  stop-color="#1e5aa8" />
      <stop offset="100%" stop-color="#4a8edc" />
    </linearGradient>

    <!-- Gold / amber light -->
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fce38a" />
      <stop offset="100%" stop-color="#d4a017" />
    </linearGradient>
  </defs>

  <!-- Background frame -->
  <rect x="20" y="20" width="360" height="460"
        fill="none" stroke="#2c1a0e" stroke-width="8" />

  <!-- Outer border -->
  <rect x="40" y="40" width="320" height="420"
        fill="none" stroke="#4a2c0f" stroke-width="4" />

  <!-- Rose window (large circle) -->
  <circle cx="200" cy="200" r="100"
          fill="url(#skyBlue)" stroke="#2c1a0e" stroke-width="3" />

  <!-- Inner rose medallion -->
  <circle cx="200" cy="200" r="40"
          fill="url(#goldLight)" stroke="#2c1a0e" stroke-width="2" />

  <!-- Radial spokes (path) -->
  <path d="M200 100 L200 300 M100 200 L300 200
           M129 129 L271 271 M129 271 L271 129"
        stroke="#2c1a0e" stroke-width="2" />

  <!-- Trefoil quartrefoil decoration (small circles) -->
  <circle cx="200" cy="110" r="14" fill="#c0392b" stroke="#2c1a0e" stroke-width="1.5" />
  <circle cx="200" cy="290" r="14" fill="#27ae60" stroke="#2c1a0e" stroke-width="1.5" />
  <circle cx="110" cy="200" r="14" fill="#e67e22" stroke="#2c1a0e" stroke-width="1.5" />
  <circle cx="290" cy="200" r="14" fill="#8e44ad" stroke="#2c1a0e" stroke-width="1.5" />

  <!-- Scalloped bottom panel -->
  <path d="M60 400 Q130 360 200 400 Q270 360 340 400 L340 460 L60 460 Z"
        fill="url(#goldLight)" stroke="#2c1a0e" stroke-width="2" />

  <!-- Crown / finial at top -->
  <path d="M185 40 L200 15 L215 40"
        fill="none" stroke="#d4a017" stroke-width="3" />
  <circle cx="200" cy="10" r="6" fill="#d4a017" />

  <!-- Label (transformed text) -->
  <g transform="translate(200, 360)">
    <text text-anchor="middle" font-family="serif" font-size="14"
          fill="#fce38a" font-style="italic">
      Chartres Blue
    </text>
  </g>
</svg>
